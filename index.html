<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vels University — Lab Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase v9 compat (modular-lite works via CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- QR generation + scanning -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qr-scanner/1.4.2/qr-scanner.umd.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --ink:#14181F;
  --paper:#F0F2EE;
  --surface:#FFFFFF;
  --surface2:#F7F8F6;
  --line:#E2E4E0;
  --signal:#1FA37A;
  --signal-dim:#E6F4EF;
  --signal-dark:#0f6b4f;
  --alert:#D6453A;
  --alert-dim:#FBEAE8;
  --warn:#C8932B;
  --warn-dim:#FBF1DE;
  --muted:#6B7280;
  --radius:14px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --nav-h:64px;
  --rail-w:220px;
  --hero-grad:linear-gradient(135deg,#0f2419 0%,#1a3d2b 60%,#0d2e40 100%);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);-webkit-tap-highlight-color:transparent;min-height:100vh;}
button{font-family:inherit;}
input,select{font-family:inherit;}
.mono{font-family:var(--font-mono);}
.display{font-family:var(--font-display);}

#app{display:flex;flex-direction:column;min-height:100vh;}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--ink);padding:0 16px;height:56px;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:sticky;top:0;z-index:20;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img.top-logo{width:90px;height:auto;}
.brand-text{display:flex;flex-direction:column;line-height:1.2;}
.brand-text strong{color:#fff;font-size:13px;font-family:var(--font-display);}
.brand-text span{color:rgba(255,255,255,.5);font-size:11px;}
.identity{display:flex;align-items:center;gap:8px;}

@media (max-width:600px){
  .topbar{padding:0 12px;height:52px;}
  .brand img.top-logo{width:70px;}
  .brand-text{display:none;}
}

.role-pill{
  font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(31,163,122,.25);color:#5ef0b7;border:1px solid rgba(94,240,183,.3);
}
.icon-btn{
  background:none;border:1px solid rgba(255,255,255,.2);border-radius:10px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.8);flex-shrink:0;
}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.icon-btn:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{
  outline:2px solid var(--signal);outline-offset:2px;
}
.vels-logo{
  width:90%;max-width:600px;height:auto;display:block;margin:0 auto;
}
/* ============================================================
   LAYOUT SHELL
   ============================================================ */
.shell{flex:1;display:flex;flex-direction:column;width:100%;}
.content{
  flex:1;width:100%;max-width:880px;margin:0 auto;
  padding:16px 14px calc(var(--nav-h) + 24px);
}
@media (min-width:861px){
  .shell{flex-direction:row;}
  .content{padding:24px 28px;max-width:760px;margin:0;}
}
@media (max-width:400px){
  .content{padding:12px 10px calc(var(--nav-h) + 20px);}
}

/* ============================================================
   NAV (bottom mobile / rail desktop)
   ============================================================ */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;justify-content:space-around;
  background:var(--surface);border-top:1px solid var(--line);
  height:var(--nav-h);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;
}
.nav button svg{width:20px;height:20px;}
.nav button.active{color:var(--signal);}
.nav button.active svg{stroke:var(--signal);}
@media (min-width:861px){
  .nav{
    position:static;flex-direction:column;justify-content:flex-start;align-items:stretch;
    width:var(--rail-w);height:auto;border-top:none;border-right:1px solid var(--line);
    padding:18px 10px;gap:4px;
  }
  .nav button{
    flex:none;flex-direction:row;justify-content:flex-start;gap:10px;
    padding:11px 12px;border-radius:10px;font-size:14px;
  }
  .nav button.active{background:var(--signal-dim);}
}

/* ============================================================
   GENERIC COMPONENTS
   ============================================================ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.stack{display:flex;flex-direction:column;gap:14px;}
.row{display:flex;gap:10px;align-items:center;}
.row.between{justify-content:space-between;}
.row.wrap{flex-wrap:wrap;}

h1.page-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-0.01em;}
p.page-sub{color:var(--muted);font-size:13px;margin:0 0 18px;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
@media (max-width:340px){.stats-row{grid-template-columns:repeat(3,1fr);gap:6px;}}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 10px;}
.stat .num{font-family:var(--font-mono);font-size:20px;font-weight:600;}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.btn{
  font-family:var(--font-body);font-weight:600;font-size:14px;
  border-radius:10px;padding:11px 16px;border:1px solid transparent;
  cursor:pointer;display:inline-flex;align-items:center;gap:8px;justify-content:center;
  transition:transform .04s ease;text-decoration:none;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#262c36;}
.btn-signal{background:var(--signal);color:#fff;}
.btn-signal:hover{background:#178a66;}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{background:var(--surface2);color:var(--ink);}
.auth-back .btn-ghost:hover{background:rgba(255,255,255,0.15);color:#ffffff;filter:brightness(1.3);}
.home-hero .btn-ghost,.scan-bottom .btn-ghost{color:#fff;border-color:rgba(255,255,255,.3);}
.home-hero .btn-ghost:hover,.scan-bottom .btn-ghost:hover{background:rgba(255,255,255,.1);}
/* ghost on dark topbar/session cards that appear on --ink bg */
.topbar .btn-ghost{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.2);}
.topbar .btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-danger{background:none;border:1px solid #f0c6c2;color:var(--alert);}
.btn-danger:hover{background:var(--alert-dim);}
.btn-block{width:100%;}
.btn-sm{padding:7px 11px;font-size:12px;border-radius:8px;}

label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;}
.field{margin-bottom:14px;}
input[type=text],input[type=password],input[type=email],input[type=date],input[type=time],select{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
  font-size:14px;background:var(--surface);color:var(--ink);
}
input:focus,select:focus{outline:2px solid var(--signal);outline-offset:1px;border-color:var(--signal);}
.help{font-size:11px;color:var(--muted);margin-top:5px;}
.err-text{font-size:12px;color:var(--alert);margin-top:6px;display:none;}
.err-text.show{display:block;}

.badge{
  font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:5px;font-weight:600;white-space:nowrap;
}
.badge-present{background:var(--signal-dim);color:#0f6b4f;}
.badge-absent{background:var(--alert-dim);color:#a23227;}
.badge-active{background:var(--signal-dim);color:#0f6b4f;}
.badge-scheduled{background:var(--warn-dim);color:#8a6516;}
.badge-ended{background:#EDEEF0;color:var(--muted);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-dot.pulse{animation:pulse 1.6s ease-in-out infinite;}
@media (prefers-reduced-motion:reduce){.badge-dot.pulse{animation:none;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.table-wrap{
  overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--surface);-webkit-overflow-scrolling:touch;
}
table{width:100%;border-collapse:collapse;min-width:380px;}
th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;
}
td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td.mono,th.mono{font-family:var(--font-mono);}
.action-icons{display:flex;gap:6px;}
@media (max-width:500px){
  th,td{padding:9px 10px;font-size:12px;}
}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .glyph{font-size:28px;margin-bottom:10px;}
.empty p{margin:0 0 16px;font-size:13px;}

.search-bar{position:relative;flex:1;}
.search-bar input{padding-left:34px;}
.search-bar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);}

/* ============================================================
   MODAL / OVERLAY
   ============================================================ */
.overlay{
  position:fixed;inset:0;background:rgba(20,24,31,.5);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;
  padding:20px;max-height:88vh;overflow-y:auto;
}
@media (min-width:640px){
  .overlay{align-items:center;}
  .modal{border-radius:var(--radius);margin:20px;}
}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h2{font-family:var(--font-display);font-size:18px;margin:0;}

/* ============================================================
   HOME / LANDING PAGE
   ============================================================ */
.home-page{min-height:100vh;display:flex;flex-direction:column;}

.home-hero{
  background:#010a13;color:#fff;
  padding:70px 20px 50px;
  text-align:center;position:relative;overflow:hidden;
}
@media (max-width:600px){
  .home-hero{padding:60px 16px 40px;}
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(31,163,122,.25) 0%, transparent 70%);
  pointer-events:none;
}
.hero-logo{
  display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px;
}
.hero-logo-icon{
  width:52px;height:52px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
}
.hero-logo-icon svg{width:28px;height:28px;stroke:#fff;}
.hero-logo-text{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.hero-headline{
  font-family:var(--font-display);font-size:clamp(28px,6vw,46px);font-weight:700;
  line-height:1.12;letter-spacing:-0.02em;margin:0 0 16px;
}
.hero-headline em{font-style:normal;color:#5ef0b7;}
.hero-sub{font-size:16px;color:rgba(255,255,255,.72);max-width:480px;margin:0 auto 40px;line-height:1.6;}

.home-login-cards{
  display:flex;flex-direction:column;gap:12px;
  max-width:400px;margin:0 auto;padding:0;
}
@media (min-width:600px){
  .home-login-cards{flex-direction:row;max-width:660px;}
}

.login-card{
  flex:1;border:1px solid rgba(255,255,255,.15);border-radius:18px;
  padding:24px 20px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);
  cursor:pointer;color:#fff;text-align:left;transition:border-color .15s,background .15s;
}
.login-card:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.13);}
.login-card-icon{
  width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
}
.login-card-icon svg{width:22px;height:22px;stroke:#fff;}
.login-card strong{font-family:var(--font-display);font-size:17px;display:block;margin-bottom:4px;}
.login-card span{font-size:13px;color:rgba(255,255,255,.6);}
.login-card .arrow{margin-top:18px;font-size:13px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px;}
.login-card .arrow svg{width:14px;height:14px;stroke:currentColor;transition:transform .15s;}
.login-card:hover .arrow svg{transform:translateX(4px);}

.home-features{
  background:var(--surface);padding:60px 24px;
}
.features-inner{max-width:800px;margin:0 auto;}
.features-label{font-family:var(--font-mono);font-size:11px;color:var(--signal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.features-title{font-family:var(--font-display);font-size:clamp(22px,4vw,30px);font-weight:700;letter-spacing:-0.01em;margin:0 0 40px;}
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.feature-item{padding:20px;border:1px solid var(--line);border-radius:var(--radius);}
.feature-icon{width:38px;height:38px;border-radius:10px;background:var(--signal-dim);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.feature-icon svg{width:18px;height:18px;stroke:var(--signal);}
.feature-title{font-family:var(--font-display);font-size:15px;font-weight:700;margin:0 0 6px;}
.feature-desc{font-size:13px;color:var(--muted);line-height:1.5;margin:0;}

.home-footer{
  background:var(--ink);color:rgba(255,255,255,.45);font-size:12px;
  text-align:center;padding:20px;margin-top:auto;
}
.home-footer strong{color:rgba(255,255,255,.7);}

/* ============================================================
   AUTH (LOGIN / REGISTER) PAGES
   ============================================================ */
.auth-page{
  background-color:#0a1628;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.auth-card{
  width:100%;max-width:400px;background:#05193e;
  border:1px solid rgba(255,255,255,.1);border-radius:20px;
  padding:28px 24px;text-align:center;
}
@media (max-width:420px){
  .auth-card{padding:22px 18px;border-radius:16px;}
}
.auth-back{margin-bottom:20px;}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.auth-logo svg{width:24px;height:24px;}
.auth-logo strong{font-family:var(--font-display);font-size:16px;}
.auth-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-0.01em;color:#fff;}
.auth-sub{font-size:13px;color:#c6dbcb;margin:0 0 24px;}
.auth-divider{height:1px;background:rgba(255,255,255,.12);margin:20px 0;}
.auth-switch{font-size:13px;color:#ffffff;text-align:center;}
.auth-switch button{background:none;border:none;color:var(--signal);font-weight:600;cursor:pointer;padding:0;}
/* auth inputs on dark background */
.auth-page input{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:#fff;}
.auth-page input::placeholder{color:rgba(255,255,255,.35);}
.auth-page input:focus{background:rgba(255,255,255,.1);border-color:var(--signal);}
.auth-page label{color:rgba(255,255,255,.6);text-align:left;display:block;}

.login-logos{
  display:flex;justify-content:center;align-items:center;
  gap:12px;margin-bottom:18px;
}
.login-logo{
  width:52px;height:52px;object-fit:contain;
}
@media (max-width:380px){
  .login-logo{width:42px;height:42px;}
}
.auth-card h3{
  color:#fff;text-align:center;margin:0 0 6px;
  font-family:var(--font-display);font-size:18px;
}
/* ============================================================
   ROLE SELECT (intermediate)
   ============================================================ */
.role-select{
  display:flex;flex-direction:column;gap:14px;justify-content:center;
  min-height:80vh;max-width:420px;margin:0 auto;width:100%;padding:24px 16px;
}
.role-select h1{font-family:var(--font-display);font-size:26px;text-align:center;margin:0 0 2px;letter-spacing:-0.01em;}
.role-select p.lead{text-align:center;color:var(--muted);font-size:13px;margin:0 0 18px;}
.role-card{
  border:1px solid var(--line);border-radius:var(--radius);padding:20px;background:var(--surface);
  display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;width:100%;
}
.role-card:hover{border-color:var(--signal);}
.role-card svg{width:30px;height:30px;flex-shrink:0;color:var(--ink);}
.role-card strong{font-family:var(--font-display);font-size:16px;display:block;}
.role-card span{font-size:12px;color:var(--muted);}

/* ============================================================
   TOAST
   ============================================================ */
.toast{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;
  padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;
  box-shadow:0 6px 18px rgba(0,0,0,.12);max-width:90vw;
}
.toast-success{background:var(--ink);color:#fff;}
.toast-error{background:var(--alert);color:#fff;}
.toast-warn{background:var(--warn);color:#fff;}

/* ============================================================
   QR DISPLAY (STAFF)
   ============================================================ */
.qr-stage{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;padding:6px;}
.qr-frame{background:#fff;padding:16px;border-radius:16px;border:1px solid var(--line);}
#qrcodeTarget img,#qrcodeTarget canvas{display:block;}
.qr-subject{font-family:var(--font-display);font-size:18px;font-weight:700;}
.qr-status-row{display:flex;align-items:center;gap:8px;justify-content:center;}
.qr-countdown{font-family:var(--font-mono);font-size:13px;color:var(--muted);}
.qr-token-info{
  background:var(--warn-dim);border:1px solid #f0d68a;border-radius:10px;
  padding:10px 14px;font-size:12px;color:#7a5a12;text-align:center;max-width:260px;
}

/* ============================================================
   SCANNER (STUDENT)
   ============================================================ */
.scan-overlay{position:fixed;inset:0;background:#0B0D10;z-index:60;display:flex;flex-direction:column;}
.scan-top{display:flex;justify-content:space-between;align-items:center;padding:16px;color:#fff;}
.scan-top .icon-btn{border-color:rgba(255,255,255,.25);color:#fff;}
.scan-viewport{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.scan-viewport video{width:100%;height:100%;object-fit:cover;}
.scan-frame{
  position:absolute;width:min(70vw,260px);height:min(70vw,260px);
  border:none;
}
.scan-frame .corner{position:absolute;width:28px;height:28px;border:3px solid var(--signal);}
.scan-frame .tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.scan-frame .tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
.scan-frame .bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 8px;}
.scan-frame .br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 8px 0;}
.scan-line{position:absolute;left:6%;right:6%;height:2px;background:var(--signal);box-shadow:0 0 8px var(--signal);animation:scanmove 2.1s ease-in-out infinite;}
@keyframes scanmove{0%{top:6%;}50%{top:92%;}100%{top:6%;}}
@media (prefers-reduced-motion:reduce){.scan-line{animation:none;top:50%;}}
.scan-bottom{padding:18px;text-align:center;}
.scan-hint{color:#fff;font-size:13px;opacity:.8;margin-bottom:14px;}

.scan-result{
  position:fixed;inset:0;z-index:65;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:30px;
}
.result-glyph{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.result-glyph.ok{background:var(--signal-dim);color:var(--signal);}
.result-glyph.bad{background:var(--alert-dim);color:var(--alert);}
.result-glyph.warn{background:var(--warn-dim);color:var(--warn);}
.result-glyph svg{width:32px;height:32px;}
.result-title{font-family:var(--font-display);font-size:19px;font-weight:700;}
.result-sub{color:var(--muted);font-size:13px;max-width:280px;}

async function changeStudentPasswordByStaff(uid, newPassword){
  if(!S.isStaff){ flash('error','Only staff can change student passwords.'); return; }
  const stu=S.students[uid];
  if(!stu){ flash('error','Student not found.'); return; }
  S.authLoading=true; render();
  try{
    const fEmail=`${stu.rollNo.toLowerCase().replace(/[^a-z0-9]/g,'_')}@labtrack-students.local`;
    let secondaryApp;
    try{ secondaryApp=firebase.app('labtrack-secondary'); }
    catch{ secondaryApp=firebase.initializeApp(firebaseConfig,'labtrack-secondary'); }
    const secondaryAuth=firebase.auth(secondaryApp);
    // Sign in with the old password is not possible without knowing it.
    // Use createUserWithEmailAndPassword to check — if account exists, we can't update without current PW.
    // Best approach: delete the Firebase Auth user and recreate with new password, keeping DB record intact.
    // Since we don't have Admin SDK, we sign in as student with a known password first.
    // Workaround: use updatePassword via re-auth by prompting current password, 
    // OR: re-create the account (delete old firebase auth user + create new one with same uid is not possible client-side).
    // PRACTICAL SOLUTION: We store a "staffSetPassword" flow:
    // 1. Delete Firebase Auth user (not possible without admin)
    // 2. Create new Firebase Auth user with same email + new password
    // This changes the UID, so we update the DB record.
    try{
      // Try creating — if email already in use, we need to sign in first and update
      const cred=await secondaryAuth.createUserWithEmailAndPassword(fEmail, newPassword);
      // If we got here, the old auth was deleted somehow — save new uid
      const newUid=cred.user.uid;
      await secondaryAuth.signOut();
      if(newUid!==uid){
        // Move the DB record to new UID
        await dbRef(`students/${newUid}`).set(stu);
        await dbRef(`students/${uid}`).remove();
        S.students[newUid]=stu;
        delete S.students[uid];
      }
      flash('success',`Password updated for ${stu.name} (${stu.rollNo}).`);
    }catch(e2){
      if(e2.code==='auth/email-already-in-use'){
        // Account exists — sign in and update password
        // We can't do this without the current password on the client.
        // Show modal asking for current password to re-auth and then update
        await secondaryAuth.signOut();
        S.authLoading=false;
        S.modal={type:'changeStudentPwReauth',uid,newPassword,studentName:stu.name,rollNo:stu.rollNo,fEmail};
        render(); return;
      }else{
        throw e2;
      }
    }
  }catch(e){ flash('error','Failed to update password: '+e.message); }
  S.authLoading=false; render();
}

async function changeStudentPasswordReauth(uid, fEmail, currentPassword, newPassword){
  S.authLoading=true; render();
  try{
    let secondaryApp;
    try{ secondaryApp=firebase.app('labtrack-secondary'); }
    catch{ secondaryApp=firebase.initializeApp(firebaseConfig,'labtrack-secondary'); }
    const secondaryAuth=firebase.auth(secondaryApp);
    const cred=await secondaryAuth.signInWithEmailAndPassword(fEmail, currentPassword);
    await cred.user.updatePassword(newPassword);
    await secondaryAuth.signOut();
    const stu=S.students[uid];
    flash('success',`Password updated for ${stu?.name||'student'}.`);
    S.modal=null;
  }catch(e){
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
      S.modal={...S.modal, error:'Current password is incorrect.'};
    }else{
      S.modal={...S.modal, error:e.message};
    }
  }
  S.authLoading=false; render();
}

/* ============================================================
   QR TOKEN  (time-limited, HMAC-style using Web Crypto)
   ============================================================ */
async function signPayload(payload){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(QR_SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',key,enc.encode(payload));
  return btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function buildQrToken(sessionId){
  // Token: base64url({app,sid,exp}) + "." + hmac
  const expMs=sessionEnd(S.sessions[sessionId]).getTime();
  const body=btoa(JSON.stringify({app:'labtrack',sid:sessionId,exp:expMs}));
  const sig=await signPayload(body);
  return `${body}.${sig}`;
}
async function verifyQrToken(token){
  try{
    const[bodyB64,sig]=token.split('.');
    if(!bodyB64||!sig) return null;
    const expectedSig=await signPayload(bodyB64);
    if(sig!==expectedSig) return null;
    const payload=JSON.parse(atob(bodyB64));
    if(payload.app!=='labtrack') return null;
    if(Date.now()>payload.exp) return {expired:true, payload};
    return {expired:false, payload};
  }catch{return null;}
}

   STUDENT CRUD (staff creates Firebase Auth users for students
   using a secondary Firebase app so staff session is preserved)
   ============================================================ */

async function addStudentSimple(rollNo,name,email,dept,year,password){
  // Check duplicate roll
  const existing=studentsArr().find(s=>s.rollNo.toUpperCase()===rollNo.toUpperCase());
  if(existing) throw new Error('A student with roll number '+rollNo+' already exists.');

  const fEmail=`${rollNo.toLowerCase().replace(/[^a-z0-9]/g,'_')}@labtrack-students.local`;

  // Use a SECONDARY Firebase app so the staff session is never disrupted
  let secondaryApp;
  try{
    // Try to get existing secondary app or create one
    secondaryApp = firebase.app('labtrack-secondary');
  }catch{
    secondaryApp = firebase.initializeApp(firebaseConfig,'labtrack-secondary');
  }
  const secondaryAuth = firebase.auth(secondaryApp);

  let newUserUid;
  try{
    const cred = await secondaryAuth.createUserWithEmailAndPassword(fEmail, password);
    newUserUid = cred.user.uid;
    await secondaryAuth.signOut();
  }catch(e){
    if(e.code==='auth/email-already-in-use'){
      // Student already has an auth account; sign in secondary to get uid & optionally update password
      try{
        const cred2 = await secondaryAuth.signInWithEmailAndPassword(fEmail, password);
        newUserUid = cred2.user.uid;
        await secondaryAuth.signOut();
      }catch(e2){
        throw new Error('Roll number already has an account with a different password. Delete the student and re-add to reset.');
      }
    }else{
      throw e;
    }
  }

  const data={
    rollNo:rollNo.toUpperCase(),name,email:email||'',dept:dept||'',year:year||'',
    firebaseEmail:fEmail,createdAt:new Date().toISOString()
  };
  await dbRef(`students/${newUserUid}`).set(data);
  S.students[newUserUid]=data;
  return newUserUid;
}

/* ============================================================
   SESSION MANAGEMENT
   ============================================================ */
function stopCountdown(){if(_countdownInterval){clearInterval(_countdownInterval);_countdownInterval=null;}}
function stopRefresh(){if(_refreshInterval){clearInterval(_refreshInterval);_refreshInterval=null;}}

function startCountdown(){
  stopCountdown();
  _countdownInterval=setInterval(async()=>{
    const session=S.sessions[S.qrSession];
    if(!session){stopCountdown();return;}
    const status=sessionStatus(session);
    const elText=document.getElementById('qrCountdown');
    const labelEl=document.getElementById('qrStatusLabel');
    if(!elText) return;
    if(status==='scheduled'){
      const diff=Math.max(0,sessionStart(session)-new Date());
      elText.textContent=`Opens in ${fmtDuration(diff)}`;
      if(labelEl) labelEl.textContent='Not started yet';
    }else if(status==='active'){
      const diff=Math.max(0,sessionEnd(session)-new Date());
      elText.textContent=`Closes in ${fmtDuration(diff)}`;
      if(labelEl) labelEl.textContent='Open for scanning';
    }else{
      elText.textContent='Closed — QR no longer valid';
      if(labelEl) labelEl.textContent='Session closed';
    }
  },1000);
}

let _paintedQrSession=null;
let _qrBuildPromise=null;
let _qrRefreshTimer=null;

async function paintQrCode(){
  const target=document.getElementById('qrcodeTarget');
  if(!target||!S.qrSession) return;
  if(_paintedQrSession===S.qrSession&&!target.dataset.forceRefresh) return; // already painted
  delete target.dataset.forceRefresh;
  _paintedQrSession=S.qrSession;
  target.innerHTML='<div style="width:208px;height:208px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">Generating…</div>';
  const token=await buildQrToken(S.qrSession);
  if(!document.getElementById('qrcodeTarget')) return; // modal closed
  target.innerHTML='';
  new QRCode(target,{text:token,width:208,height:208,colorDark:'#14181F',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
}

function startQrRefreshTimer(){
  stopQrRefreshTimer();
  // Re-generate QR every 2 minutes so tokens auto-rotate
  _qrRefreshTimer=setInterval(()=>{
    const t=document.getElementById('qrcodeTarget');
    if(t){ t.dataset.forceRefresh='1'; _paintedQrSession=null; paintQrCode(); }
  },120000);
}
function stopQrRefreshTimer(){
  if(_qrRefreshTimer){ clearInterval(_qrRefreshTimer); _qrRefreshTimer=null; }
}

   QR SCANNER
   ============================================================ */
async function openScanner(){
  S.scanResult=null;S.scanning=true;render();
  try{
    const video=document.getElementById('scanVideo');
    _qrScanner=new QrScanner(video,result=>handleScanned(typeof result==='string'?result:result.data),
      {highlightScanRegion:false,highlightCodeOutline:false,preferredCamera:'environment',onDecodeError:()=>{}});
    await _qrScanner.start();
  }catch{
    S.scanning=false;
    flash('error','Camera access blocked or unavailable.');
    render();
  }
}
function closeScanner(){
  S.scanning=false;
  if(_qrScanner){_qrScanner.stop();_qrScanner.destroy();_qrScanner=null;}
  render();
}
async function handleScanned(text){
  if(!S.scanning) return;
  closeScanner();
  const verified=await verifyQrToken(text);
  if(!verified){
    S.scanResult={kind:'bad',title:'NOT A SESSION QR',sub:'Scan the QR code shown by your lab staff.'};
    render();return;
  }
  if(verified.expired){
    S.scanResult={kind:'bad',title:'QR Code Expired',sub:'This session\'s QR is no longer valid. Ask staff to display the current session.'};
    render();return;
  }
  const{sid}=verified.payload;
  // Reload sessions fresh to get latest
  const snap=await dbRef(`sessions/${sid}`).once('value');
  const session=snap.val();
  if(!session){
    S.scanResult={kind:'bad',title:'Session not found',sub:'This QR does not match any active session.'};
    render();return;
  }
  S.sessions[sid]=session;
  const status=sessionStatus(session);
  if(status!=='active'){
    S.scanResult={
      kind:'bad',
      title:status==='scheduled'?'Session not started yet':'Session has ended',
      sub:status==='scheduled'?`${session.subject} opens at ${fmtTime12(session.startTime)}.`:'Ask your staff to start a new session.'
    };
    render();return;
  }
  const stu=S.currentStudentData;
  if(isPresent(sid,stu.rollNo)){
    S.scanResult={kind:'warn',title:'Already marked',sub:`You're already marked present for ${session.subject}.`};
    render();return;
  }
  await markAttendance(sid,stu.rollNo,stu.name);
  S.scanResult={kind:'ok',title:'Attendance marked!',sub:`${session.subject} — ${fmtTimestamp(new Date().toISOString())}`};
  render();
}

/* ============================================================
   MANUAL ATTENDANCE MARKING (staff)
   ============================================================ */
async function toggleManualAttendance(sessionId,studentUid){
  const stu=S.students[studentUid];
  if(!stu) return;
  const key=stu.rollNo.replace(/[^a-zA-Z0-9]/g,'_');
  const att=S.attendance[sessionId]||{};
  if(att[key]){
    // Remove
    await dbRef(`attendance/${sessionId}/${key}`).remove();
    const updated={...S.attendance[sessionId]};
    delete updated[key];
    S.attendance[sessionId]=updated;
  }else{
    await markAttendance(sessionId,stu.rollNo,stu.name);
  }
  render();
}

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCsv(sessionId){
  const session=S.sessions[sessionId];if(!session)return;
  const rows=[['Roll No','Name','Department','Year','Status','Marked At']];
  studentsArr().forEach(s=>{
    const att=S.attendance[sessionId]||{};
    const rec=Object.values(att).find(r=>r.rollNo===s.rollNo);
    rows.push([s.rollNo,s.name,s.dept||'',s.year||'',rec?'Present':'Absent',rec?fmtTimestamp(rec.time):'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${session.subject.replace(/\s+/g,'_')}_${session.date}.csv`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}

  const badgeClass=status==='active'?'badge-active':status==='scheduled'?'badge-scheduled':'badge-ended';
  const badgeLabel=status==='active'?'Active':status==='scheduled'?'Scheduled':'Ended';
  const dotPulse=status==='active'?'pulse':'';
  return `<div class="card">
  <div class="row between" style="flex-wrap:wrap;gap:8px;">
    <div>
      <strong style="font-family:var(--font-display);font-size:15px;">${esc(s.subject)}</strong>
      <div class="mono" style="font-size:12px;color:var(--muted);margin-top:4px;">${fmtDate(s.date)} · ${fmtTime12(s.startTime)} – ${fmtTime12(s.endTime)}</div>
    </div>
    <span class="badge ${badgeClass}"><span class="badge-dot ${dotPulse}"></span>${badgeLabel}</span>
  </div>
  <div class="row between" style="margin-top:14px;flex-wrap:wrap;gap:8px;">
    <span class="mono" style="font-size:12px;color:var(--muted);">${presentCount(s.id)} of ${studentsArr().length} present</span>
    <div class="session-actions">
      <button class="btn btn-ghost btn-sm" data-action="show-qr" data-id="${s.id}">${I.qr} QR</button>
      <button class="btn btn-ghost btn-sm" data-action="mark-attendance" data-id="${s.id}">${I.mark} Mark</button>
      ${status!=='ended'?`<button class="btn btn-ghost btn-sm" data-action="end-session" data-id="${s.id}">End</button>`:''}
      <button class="icon-btn" title="Delete" data-action="delete-session" data-id="${s.id}" style="border-color:#f0c6c2;color:var(--alert);">${I.trash}</button>
    </div>
  </div>
</div>`;
}
function renderStaffSessions(){
  const list=sortedSessions();
  return `
<h1 class="page-title">Sessions</h1>
<p class="page-sub">Create a lab session and show the QR for students to scan in.</p>
<div class="row" style="margin-bottom:16px;">
  <button class="btn btn-primary" data-action="open-new-session">${I.plus} New session</button>
</div>
${list.length===0?`<div class="empty"><div class="glyph">${I.qr}</div>
<p>No sessions yet. Create one to start taking attendance.</p>
<button class="btn btn-primary" data-action="open-new-session">${I.plus} Create session</button></div>`
:`<div class="stack">${list.map(sessionCardHtml).join('')}</div>`}`;
}

/* ============================================================
   RENDER: STAFF / REPORTS TAB
   ============================================================ */
function renderStaffReports(){
  const sessions=sortedSessions();
  const modeTabs=`<div class="tab-row">
    <button class="tab-chip ${S.reportMode==='session'?'active':''}" data-action="report-mode" data-mode="session">By session</button>
    <button class="tab-chip ${S.reportMode==='student'?'active':''}" data-action="report-mode" data-mode="student">By student</button>
  </div>`;
  if(S.reportMode==='session'){
    if(sessions.length===0) return `<h1 class="page-title">Reports</h1>${modeTabs}<div class="empty"><p>Create a session first.</p></div>`;
    const selId=S.reportSessionId&&sessions.some(s=>s.id===S.reportSessionId)?S.reportSessionId:sessions[0].id;
    S.reportSessionId=selId;
    const session=sessions.find(s=>s.id===selId);
    const present=presentCount(selId);
    const total=studentsArr().length;
    const pct=total?Math.round(present/total*100):0;
    return `<h1 class="page-title">Reports</h1>${modeTabs}
    <div class="field"><label>Session</label>
      <select id="reportSessionSelect">${sessions.map(s=>`<option value="${s.id}" ${s.id===selId?'selected':''}>${esc(s.subject)} — ${fmtDate(s.date)}</option>`).join('')}</select>
    </div>
    <div class="row between" style="margin-bottom:14px;">
      <span class="mono" style="font-size:13px;">${present} / ${total} present · ${pct}%</span>
      <button class="btn btn-ghost btn-sm" data-action="export-csv" data-id="${selId}">${I.download} CSV</button>
    </div>
    ${total===0?`<div class="empty"><p>No students enrolled yet.</p></div>`:`
    <div class="table-wrap"><table>
    <thead><tr><th class="mono">Roll No</th><th>Name</th><th>Status</th><th class="mono">Time</th></tr></thead>
    <tbody>
    ${studentsArr().map(s=>{
      const att=S.attendance[selId]||{};
      const rec=Object.values(att).find(r=>r.rollNo===s.rollNo);
      return `<tr>
        <td class="mono">${esc(s.rollNo)}</td><td>${esc(s.name)}</td>
        <td>${rec?'<span class="badge badge-present">Present</span>':'<span class="badge badge-absent">Absent</span>'}</td>
        <td class="mono">${rec?fmtTimestamp(rec.time):'—'}</td>
      </tr>`;}).join('')}
    </tbody></table></div>`}`;
  }else{
    const studs=studentsArr();
    if(studs.length===0) return `<h1 class="page-title">Reports</h1>${modeTabs}<div class="empty"><p>Add students first.</p></div>`;
    const selRoll=S.reportStudentUid&&studs.some(s=>s.rollNo===S.reportStudentUid)?S.reportStudentUid:studs[0].rollNo;
    S.reportStudentUid=selRoll;
    const student=studs.find(s=>s.rollNo===selRoll);
    const eligible=sessions;
    const attended=eligible.filter(s=>isPresent(s.id,student.rollNo));
    const pct=eligible.length?Math.round(attended.length/eligible.length*100):0;
    return `<h1 class="page-title">Reports</h1>${modeTabs}
    <div class="field"><label>Student</label>
      <select id="reportStudentSelect">${studs.map(s=>`<option value="${s.rollNo}" ${s.rollNo===selRoll?'selected':''}>${esc(s.name)} — ${esc(s.rollNo)}</option>`).join('')}</select>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="num mono">${pct}%</div><div class="lbl">Attendance</div></div>
      <div class="stat"><div class="num mono">${attended.length}</div><div class="lbl">Attended</div></div>
      <div class="stat"><div class="num mono">${eligible.length}</div><div class="lbl">Sessions</div></div>
    </div>
    ${eligible.length===0?`<div class="empty"><p>No sessions recorded yet.</p></div>`:`
    <div class="table-wrap"><table>
    <thead><tr><th>Session</th><th class="mono">Date</th><th>Status</th></tr></thead>
    <tbody>
    ${eligible.map(s=>`<tr>
      <td>${esc(s.subject)}</td>
      <td class="mono">${fmtDate(s.date)}</td>
      <td>${isPresent(s.id,student.rollNo)?'<span class="badge badge-present">Present</span>':'<span class="badge badge-absent">Absent</span>'}</td>
    </tr>`).join('')}
    </tbody></table></div>`}`;
  }
}

function renderModal(){
  if(!S.modal) return '';
  const m=S.modal;

  if(m.type==='addStudent'||m.type==='editStudent'){
    const editing=m.type==='editStudent';
    const s=m.payload||{};
    return `<div class="overlay" data-close-modal>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h2>${editing?'Edit student':'Add student'}</h2><button class="icon-btn" data-action="close-modal">${I.close}</button></div>
      <form data-form="${editing?'edit-student':'add-student'}" data-uid="${editing?esc(m.uid||''):''}" class="stack">
        <div class="field"><label>Roll number *</label><input name="rollNo" type="text" value="${editing?esc(s.rollNo):''}" required ${editing?'readonly':''}></div>
        <div class="field"><label>Full name *</label><input name="name" type="text" value="${editing?esc(s.name):''}" required></div>
        <div class="row wrap" style="gap:10px;">
          <div class="field" style="flex:1;min-width:110px;"><label>Department</label><input name="dept" type="text" value="${editing?esc(s.dept||''):''}" placeholder="CSE"></div>
          <div class="field" style="flex:1;min-width:90px;"><label>Year</label><input name="year" type="text" value="${editing?esc(s.year||''):''}" placeholder="3rd"></div>
        </div>
        <div class="field"><label>Email</label><input name="email" type="email" value="${editing?esc(s.email||''):''}"></div>
        <div class="field">
          <label>${editing?'Password':'Password *'}</label>
          <input name="password" type="text" value="" ${editing?'':'required'} placeholder="${editing?'(cannot be changed here — delete & re-add to reset)':'Set a password for the student'}">
          <p class="help">${editing?'Password changes require deleting and re-adding the student.':'Students log in with their roll number and this password.'}</p>
        </div>
        ${m.error?`<p style="color:var(--alert);font-size:13px;">${esc(m.error)}</p>`:''}
        <button class="btn btn-primary btn-block" type="submit">${editing?'Save changes':'Add student'}</button>
      </form>
    </div></div>`;
  }

  if(m.type==='newSession'){
    const today=new Date().toISOString().slice(0,10);
    const nowH=String(new Date().getHours()).padStart(2,'0');
    const nowM=String(new Date().getMinutes()).padStart(2,'0');
    return `<div class="overlay" data-close-modal>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h2>New session</h2><button class="icon-btn" data-action="close-modal">${I.close}</button></div>
      <form data-form="new-session" class="stack">
        <div class="field"><label>Lab / Subject name *</label><input name="subject" type="text" placeholder="Data Structures Lab" required></div>
        <div class="field"><label>Date *</label><input name="date" type="date" value="${today}" required></div>
        <div class="row wrap" style="gap:10px;">
          <div class="field" style="flex:1;min-width:120px;"><label>Start time *</label><input name="startTime" type="time" value="${nowH}:${nowM}" required></div>
          <div class="field" style="flex:1;min-width:120px;"><label>End time *</label><input name="endTime" type="time" required></div>
        </div>
        <p class="help">The QR code will only accept scans during this time window.</p>
        <button class="btn btn-primary btn-block" type="submit">Create session</button>
      </form>
    </div></div>`;
  }

  if(m.type==='markAttendance'){
    const session=S.sessions[m.sessionId];
    if(!session) return '';
    const studs=studentsArr();
    return `<div class="overlay" data-close-modal>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h2>Mark attendance</h2><button class="icon-btn" data-action="close-modal">${I.close}</button></div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">${esc(session.subject)} · ${fmtDate(session.date)}</p>
      <div class="stack">
        ${studs.length===0?`<p style="color:var(--muted);font-size:13px;">No students enrolled.</p>`:
        studs.map(s=>{
          const att=S.attendance[m.sessionId]||{};
          const present=Object.values(att).some(r=>r.rollNo===s.rollNo);
          const uids=Object.entries(S.students).filter(([k,v])=>v.rollNo===s.rollNo);
          const uid=uids.length?uids[0][0]:'';
          return `<div class="row between" style="padding:10px 0;border-bottom:1px solid var(--line);">
            <div>
              <div style="font-size:13px;font-weight:600;">${esc(s.name)}</div>
              <div class="mono" style="font-size:11px;color:var(--muted);">${esc(s.rollNo)}</div>
            </div>
            <button class="btn btn-sm ${present?'btn-signal':'btn-ghost'}" 
              data-action="toggle-attendance" data-session-id="${m.sessionId}" data-uid="${uid}">
              ${present?'✓ Present':'Mark present'}
            </button>
          </div>`;
        }).join('')}
      </div>
    </div></div>`;
  }

  if(m.type==='changeStaffPw'){
    return `<div class="overlay" data-close-modal>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h2>${I.key} Change Staff Password</h2><button class="icon-btn" data-action="close-modal">${I.close}</button></div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">Account: <strong>${esc(m.email)}</strong></p>
      <div class="card" style="background:var(--warn-dim);border-color:#e8c97a;margin-bottom:16px;padding:12px 14px;">
        <p style="font-size:13px;margin:0;color:#7a5a10;line-height:1.5;">
          Due to Firebase security, password changes require the staff member's current password. 
          Alternatively, delete and re-create their account with a new password.
        </p>
      </div>
      <form data-form="change-staff-pw" data-safekey="${esc(m.safeKey)}" data-email="${esc(m.email)}" class="stack">
        <div class="field">
          <label>Current Password</label>
          <input name="currentPassword" type="password" required placeholder="Staff member's current password" autocomplete="off">
        </div>
        <div class="field">
          <label>New Password</label>
          <input name="newPassword" type="password" required placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
        ${m.error?`<p style="color:var(--alert);font-size:13px;margin:0;">${esc(m.error)}</p>`:''}
        <button class="btn btn-signal btn-block" type="submit" ${S.authLoading?'disabled':''}>
          ${S.authLoading?'<span style="opacity:.6">Updating…</span>':'Update Password'}
        </button>
      </form>
    </div></div>`;
  }

  if(m.type==='changeStudentPw'){
    const stu=S.students[m.uid];
    return `<div class="overlay" data-close-modal>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h2>${I.key} Change Student Password</h2><button class="icon-btn" data-action="close-modal">${I.close}</button></div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">Student: <strong>${esc(stu?.name||'')}</strong> · <span class="mono">${esc(stu?.rollNo||'')}</span></p>
      <form data-form="change-student-pw" data-uid="${esc(m.uid)}" class="stack">
        <div class="field">
          <label>Current Password <span style="font-weight:400;color:var(--muted);">(required for re-authentication)</span></label>
          <input name="currentPassword" type="password" required placeholder="Student's current password" autocomplete="off">
        </div>
        <div class="field">
          <label>New Password</label>
          <input name="newPassword" type="password" required placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
        ${m.error?`<p style="color:var(--alert);font-size:13px;margin:0;">${esc(m.error)}</p>`:''}
        <button class="btn btn-signal btn-block" type="submit" ${S.authLoading?'disabled':''}>
          ${S.authLoading?'<span style="opacity:.6">Updating…</span>':'Update Password'}
        </button>
      </form>
    </div></div>`;
  }

  return '';
}

function renderQrView(){
  if(!S.qrSession) return '';
  const session=S.sessions[S.qrSession];
  if(!session) return '';
  const status=sessionStatus(session);
  return `<div class="overlay" style="align-items:center;">
  <div class="modal" style="max-width:340px;border-radius:18px;">
    <div class="modal-head"><h2>Session QR</h2><button class="icon-btn" data-action="close-qr">${I.close}</button></div>
    <div class="qr-stage">
      <div class="qr-subject">${esc(session.subject)}</div>
      <div class="mono" style="font-size:12px;color:var(--muted);">${fmtDate(session.date)} · ${fmtTime12(session.startTime)}–${fmtTime12(session.endTime)}</div>
      <div class="qr-frame"><div id="qrcodeTarget"></div></div>
      <div class="qr-token-info">${I.clock} QR token is cryptographically bound to this session's end time and cannot be used after it closes. Auto-refreshes every 2 min.</div>
      <div class="qr-status-row">
        <span class="badge ${status==='active'?'badge-active':status==='scheduled'?'badge-scheduled':'badge-ended'}">
          <span class="badge-dot ${status==='active'?'pulse':''}"></span>
          <span id="qrStatusLabel">${status==='active'?'Open for scanning':status==='scheduled'?'Not started yet':'Closed'}</span>
        </span>
      </div>
      <div class="qr-countdown" id="qrCountdown">—</div>
      <div class="mono" style="font-size:12px;color:var(--muted);">Present: <span id="qrPresentCount">${presentCount(S.qrSession)}</span> / ${studentsArr().length}</div>
      <div class="row" style="gap:8px;">

        <button class="btn btn-primary btn-sm" data-action="close-qr">Done</button>
      </div>
    </div>
  </div></div>`;
}

function renderStudentScan(){
  const stu=S.currentStudentData;
  const today=new Date().toISOString().slice(0,10);
  const todaySessions=sortedSessions().filter(s=>s.date===today);
  const activeSessions=todaySessions.filter(s=>sessionStatus(s)==='active');
  const upcomingSessions=todaySessions.filter(s=>sessionStatus(s)==='scheduled');

  let sessionInfo='';
  if(activeSessions.length>0){
    sessionInfo=`<div style="margin-top:18px;text-align:left;">
      <p style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px;">Active now</p>
      ${activeSessions.map(s=>{
        const alreadyPresent=isPresent(s.id,stu.rollNo);
        return `<div class="card" style="margin-bottom:8px;padding:12px 16px;">
          <div class="row between">
            <div>
              <div style="font-weight:600;font-size:14px;">${esc(s.subject)}</div>
              <div class="mono" style="font-size:11px;color:var(--muted);">${fmtTime12(s.startTime)} – ${fmtTime12(s.endTime)}</div>
            </div>
            ${alreadyPresent
              ?'<span class="badge badge-present">✓ Marked</span>'
              :'<span class="badge badge-active"><span class="badge-dot pulse"></span>Open</span>'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(upcomingSessions.length>0){
    sessionInfo=`<div style="margin-top:18px;text-align:left;">
      <p style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px;">Upcoming today</p>
      ${upcomingSessions.map(s=>`<div class="card" style="margin-bottom:8px;padding:12px 16px;">
        <div style="font-weight:600;font-size:14px;">${esc(s.subject)}</div>
        <div class="mono" style="font-size:11px;color:var(--muted);">Opens at ${fmtTime12(s.startTime)}</div>
      </div>`).join('')}
    </div>`;
  } else if(todaySessions.length>0){
    sessionInfo=`<p style="font-size:13px;color:var(--muted);margin-top:14px;">All sessions for today have ended.</p>`;
  } else {
    sessionInfo=`<p style="font-size:13px;color:var(--muted);margin-top:14px;">No sessions scheduled for today.</p>`;
  }

  return `
<h1 class="page-title">Mark attendance</h1>
<p class="page-sub">Scan the QR code displayed by your lab staff.</p>
<div class="card" style="text-align:center;padding:28px 20px;">
  <div style="width:56px;height:56px;margin:0 auto 16px;color:var(--signal);">${I.qr}</div>
  <p style="font-size:13px;color:var(--muted);margin:0 0 18px;">Camera access is needed. Point your camera at the QR shown on the lab screen.</p>
  <button class="btn btn-signal" data-action="open-scan">${I.qr} Scan QR code</button>
  ${sessionInfo}
</div>`;
}

  if(!S.scanResult) return '';
  const r=S.scanResult;
  const glyph=r.kind==='ok'?I.check:r.kind==='warn'?I.alertCircle:I.close;
  const cls=r.kind==='ok'?'ok':r.kind==='warn'?'warn':'bad';
  return `<div class="scan-result">
  <div class="result-glyph ${cls}">${glyph}</div>
  <div class="result-title">${esc(r.title)}</div>
  <div class="result-sub">${esc(r.sub)}</div>
  <button class="btn btn-primary" data-action="scan-result-done">Done</button>
</div>`;
}

   RENDER: STAFF ACCOUNTS (Dean only)
   ============================================================ */
function renderStaffAccounts(){
  if(!isDean(S.authUser?.email)){
    return `<div class="empty"><div class="glyph">${I.shield}</div><p>Access denied. Only the Dean can manage staff accounts.</p></div>`;
  }
  const err=S.modal?.error?`<p style="color:var(--alert);font-size:13px;margin:0 0 8px;">${esc(S.modal.error)}</p>`:'';
  const staffList=Object.entries(S.staffAccounts);

  const listHtml=staffList.length===0
    ?`<div class="empty" style="padding:24px 0;"><p style="margin:0;font-size:13px;color:var(--muted);">No staff accounts created yet.</p></div>`
    :`<div class="table-wrap" style="margin-top:18px;"><table>
  <thead><tr><th>Email</th><th class="mono">Created</th><th>By</th><th></th></tr></thead>
  <tbody>
  ${staffList.map(([safeKey,rec])=>`<tr>
    <td><strong style="font-size:13px;">${esc(rec.email)}</strong></td>
    <td class="mono" style="font-size:12px;white-space:nowrap;">${rec.createdAt?fmtTimestamp(rec.createdAt):'—'}</td>
    <td style="font-size:12px;color:var(--muted);">${esc(rec.createdBy||'—')}</td>
    <td><div class="action-icons">
      <button class="icon-btn" title="Change password" data-action="open-change-staff-pw" data-safekey="${esc(safeKey)}" data-email="${esc(rec.email)}">${I.key}</button>
      <button class="icon-btn btn-danger" style="border-color:#f0c6c2;color:var(--alert);" title="Delete account" data-action="delete-staff-account" data-safekey="${esc(safeKey)}" data-email="${esc(rec.email)}">${I.trash}</button>
    </div></td>
  </tr>`).join('')}
  </tbody></table></div>`;

  return `
<h1 class="page-title">Staff Accounts</h1>
<p class="page-sub">Create and manage login credentials for lab staff. Only you (the Dean) can do this.</p>

<div class="card" style="max-width:460px;">
  <h2 style="font-family:var(--font-display);font-size:17px;margin:0 0 14px;"> Create New Staff Account</h2>
  <form data-form="create-staff" class="stack">
    <div class="field">
      <label>Staff Email</label>
      <input name="staffEmail" type="email" required placeholder="e.g. staff@gmail.com" autocomplete="off">
      <p class="help">Any email address works — Gmail, college email, etc.</p>
    </div>
    <div class="field">
      <label>Temporary Password</label>
      <input name="staffPassword" type="password" required placeholder="Min. 6 characters" autocomplete="new-password">
      <p class="help">Share this with the staff member.</p>
    </div>
    ${err}
    <button class="btn btn-signal btn-block" type="submit" ${S.authLoading?'disabled':''}>
      ${S.authLoading?'<span style="opacity:.6">Creating…</span>':'Create Staff Account'}
    </button>
  </form>
</div>

<div style="margin-top:24px;">
  <h2 style="font-family:var(--font-display);font-size:17px;margin:0 0 4px;">Staff Accounts (${staffList.length})</h2>
  <p style="font-size:13px;color:var(--muted);margin:0 0 4px;">Staff members who can log in to the portal.</p>
  ${listHtml}
</div>

<div class="card" style="margin-top:14px;max-width:460px;background:var(--warn-dim);border-color:#e8c97a;">
  <p style="font-size:13px;margin:0;color:#7a5a10;line-height:1.6;">
    <strong>Note:</strong> Deleting an account here removes their login access. Their session and attendance records are preserved. To reset a password, use the key icon next to the account.
  </p>
</div>`;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render(){
  const app=document.getElementById('app');
  if(!app) return;

  if(CONFIG_IS_PLACEHOLDER){ app.innerHTML=renderConfigNotice(); return; }
  if(!auth){ app.innerHTML=renderConfigNotice(); return; }
  if(S.authLoading){ app.innerHTML=`<div class="loading-screen"><div class="spin"></div><span>Loading…</span></div>`; return; }

  let html='';
  if(S.view==='home') html=renderHome();
  else if(S.view==='staffLogin') html=renderStaffLogin();
  else if(S.view==='studentLogin') html=renderStudentLogin();
  else if(S.view==='staffApp'){
    let body='';
    if(S.staffTab==='students') body=renderStaffStudents();
    else if(S.staffTab==='sessions') body=renderStaffSessions();
    else if(S.staffTab==='staff-accounts') body=renderStaffAccounts();
    else body=renderStaffReports();
    html=`${topbar()}<div class="shell">${staffNav()}<div class="content">${body}</div></div>${renderModal()}${renderQrView()}`;
  }
  else if(S.view==='studentApp'){
    let body='';
    if(S.studentTab==='scan') body=renderStudentScan();
    else if(S.studentTab==='history') body=renderStudentHistory();
    else body=renderStudentProfile();
    html=`${topbar()}<div class="shell">${studentNav()}<div class="content">${body}</div></div>`;
  }

  app.innerHTML=html+toastHtml()+renderScanOverlay()+renderScanResult();

  if(S.qrSession) paintQrCode();
  bindLiveInputs();
}

function bindLiveInputs(){
  const si=document.getElementById('studentSearchInput');
  if(si) si.addEventListener('input',e=>{ S.studentSearch=e.target.value; renderStudentsTableOnly(); });
  const rss=document.getElementById('reportSessionSelect');
  if(rss) rss.addEventListener('change',e=>{ S.reportSessionId=e.target.value; render(); });
  const rstu=document.getElementById('reportStudentSelect');
  if(rstu) rstu.addEventListener('change',e=>{ S.reportStudentUid=e.target.value; render(); });
}

function renderStudentsTableOnly(){
  const q=S.studentSearch.trim().toLowerCase();
  const all=studentsArr();
  const list=q?all.filter(s=>s.rollNo.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)||(s.dept||'').toLowerCase().includes(q)):all;
  const wrap=document.querySelector('.table-wrap');
  if(!wrap) return;
  if(list.length===0){ wrap.outerHTML=`<div class="empty"><p>No students match "${esc(S.studentSearch)}"</p></div>`; return; }
  // just re-render the content area for perf
  render();
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click',e=>{
  // overlay close
  if(e.target.matches('[data-close-modal]')){ S.modal=null; render(); return; }
  const el=e.target.closest('[data-action]');
  if(!el) return;
  handleAction(el.dataset.action,el);
});

document.addEventListener('submit',async e=>{
  const form=e.target;
  if(!form.dataset.form) return;
  e.preventDefault();
  const fd=new FormData(form);
  const get=k=>(fd.get(k)||'').toString().trim();

  if(form.dataset.form==='staff-auth'){
    const email=get('email'),password=get('password');
    await staffLogin(email,password);
  }

  else if(form.dataset.form==='create-staff'){
    if(!isDean(S.authUser?.email)){ flash('error','Only the Dean can create staff accounts.'); return; }
    const email=get('staffEmail'),password=get('staffPassword');
    if(!email||!password){ flash('error','Email and password are required.'); return; }
    await createStaffByDean(email,password);
  }

  else if(form.dataset.form==='student-auth'){
    const rollNo=get('rollNo'),password=get('password');
    await studentLogin(rollNo,password);
  }

  else if(form.dataset.form==='add-student'){
    const rollNo=get('rollNo'),name=get('name'),email=get('email'),dept=get('dept'),year=get('year'),password=get('password');
    if(!rollNo||!name||!password){ flash('error','Roll number, name and password are required.'); return; }
    try{
      S.modal={...S.modal,error:null};
      flash('warn','Creating student account…');
      await addStudentSimple(rollNo,name,email,dept,year,password);
      if(S.view==='staffApp'){ flash('success','Student added.'); S.modal=null; render(); }
    }catch(e){ S.modal={...S.modal,error:e.message}; render(); }
  }

  else if(form.dataset.form==='edit-student'){
    const uid=form.dataset.uid;
    const name=get('name'),email=get('email'),dept=get('dept'),year=get('year'),newPassword=get('password');
    if(!name){ flash('error','Name is required.'); return; }
    const existing=S.students[uid];
    if(!existing){ flash('error','Student not found.'); return; }
    const updated={...existing,name,email:email||'',dept:dept||'',year:year||''};
    try{
      await saveStudent(uid,updated);
      if(newPassword){
        flash('warn','Profile saved. To change password, delete and re-add the student — Firebase client SDK requires knowing the current password to update it.');
      } else {
        flash('success','Student updated.');
      }
      S.modal=null; render();
    }catch{ flash('error','Failed to save. Check your connection.'); }
  }

  else if(form.dataset.form==='new-session'){
    const subject=get('subject'),date=get('date'),startTime=get('startTime'),endTime=get('endTime');
    if(!subject||!date||!startTime||!endTime){ flash('error','Fill in all fields.'); return; }
    if(endTime<=startTime){ flash('error','End time must be after start time.'); return; }
    const id=genId();
    const session={id,subject,date,startTime,endTime,endedManually:false,createdAt:new Date().toISOString()};
    try{
      await saveSession(id,session);
      flash('success','Session created.'); S.modal=null; S.staffTab='sessions'; render();
    }catch{ flash('error','Failed to save session.'); }
  }

  else if(form.dataset.form==='change-staff-pw'){
    const safeKey=form.dataset.safekey;
    const email=form.dataset.email;
    const currentPassword=get('currentPassword');
    const newPassword=get('newPassword');
    if(!currentPassword||!newPassword){ flash('error','Both passwords are required.'); return; }
    if(newPassword.length<6){ flash('error','New password must be at least 6 characters.'); return; }
    S.authLoading=true; render();
    try{
      let secondaryApp;
      try{ secondaryApp=firebase.app('labtrack-staff-reg'); }
      catch{ secondaryApp=firebase.initializeApp(firebaseConfig,'labtrack-staff-reg'); }
      const secondaryAuth=firebase.auth(secondaryApp);
      const cred=await secondaryAuth.signInWithEmailAndPassword(email,currentPassword);
      await cred.user.updatePassword(newPassword);
      await secondaryAuth.signOut();
      flash('success',`Password updated for ${email}.`);
      S.modal=null;
    }catch(e){
      if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
        S.modal={...S.modal,error:'Current password is incorrect.'};
      }else{
        S.modal={...S.modal,error:e.message};
      }
    }
    S.authLoading=false; render();
  }

  else if(form.dataset.form==='change-student-pw'){
    const uid=form.dataset.uid;
    const currentPassword=get('currentPassword');
    const newPassword=get('newPassword');
    if(!currentPassword||!newPassword){ flash('error','Both passwords are required.'); return; }
    if(newPassword.length<6){ flash('error','New password must be at least 6 characters.'); return; }
    const stu=S.students[uid];
    if(!stu){ flash('error','Student not found.'); return; }
    const fEmail=`${stu.rollNo.toLowerCase().replace(/[^a-z0-9]/g,'_')}@labtrack-students.local`;
    S.authLoading=true; render();
    try{
      let secondaryApp;
      try{ secondaryApp=firebase.app('labtrack-secondary'); }
      catch{ secondaryApp=firebase.initializeApp(firebaseConfig,'labtrack-secondary'); }
      const secondaryAuth=firebase.auth(secondaryApp);
      const cred=await secondaryAuth.signInWithEmailAndPassword(fEmail,currentPassword);
      await cred.user.updatePassword(newPassword);
      await secondaryAuth.signOut();
      flash('success',`Password updated for ${stu.name} (${stu.rollNo}).`);
      S.modal=null;
    }catch(e){
      if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
        S.modal={...S.modal,error:'Current password is incorrect.'};
      }else{
        S.modal={...S.modal,error:e.message};
      }
    }
    S.authLoading=false; render();
  }
});

async function handleAction(action,el){
  const id=el?.dataset?.id;
  const uid=el?.dataset?.uid;

  switch(action){
    case 'goto-home':       S.view='home';S.authError='';render();break;
    case 'goto-staff-login':S.view='staffLogin';S.authError='';render();break;
    case 'goto-student-login':S.view='studentLogin';S.authError='';render();break;
    case 'toggle-staff-reg':/* disabled — staff accounts created by Dean only */break;
    case 'logout':          await doLogout();break;

    case 'staff-tab':  S.staffTab=el.dataset.tab;S.modal=null;render();break;
    case 'student-tab':S.studentTab=el.dataset.tab;render();break;

    case 'open-add-student':S.modal={type:'addStudent'};render();break;
    case 'open-edit-student':{
      const stu=S.students[uid];
      if(stu) S.modal={type:'editStudent',uid,payload:stu};render();break;
    }
    case 'delete-student':{
      const stu=S.students[uid];
      if(stu&&confirm(`Remove ${stu.name} (${stu.rollNo})? Their past attendance records will be kept.`)){
        try{ await deleteStudentData(uid);flash('success','Student removed.');render(); }
        catch{ flash('error','Delete failed.'); }
      }break;
    }
    case 'close-modal':S.modal=null;render();break;

    case 'open-new-session':S.modal={type:'newSession'};render();break;

    case 'open-change-student-pw':{
      S.modal={type:'changeStudentPw',uid};render();break;
    }
    case 'open-change-staff-pw':{
      const safeKey=el.dataset.safekey;
      const email=el.dataset.email;
      S.modal={type:'changeStaffPw',safeKey,email};render();break;
    }
    case 'delete-staff-account':{
      const safeKey=el.dataset.safekey;
      const email=el.dataset.email;
      if(email&&email.toLowerCase()===DEAN_EMAIL.toLowerCase()){
        flash('error','Cannot delete the Dean account.');break;
      }
      if(confirm(`Remove staff access for ${email}? They will no longer be able to log in.`)){
        await deleteStaffAccount(safeKey);
      }break;
    }
    case 'mark-attendance':S.modal={type:'markAttendance',sessionId:id};render();break;

    case 'toggle-attendance':{
      const sid=el.dataset.sessionId,tuid=el.dataset.uid;
      try{
        await toggleManualAttendance(sid,tuid);
      }catch{ flash('error','Failed to update attendance.'); break; }
      // re-render modal with updated data
      S.modal={type:'markAttendance',sessionId:sid};render();break;
    }

    case 'show-qr':
      _paintedQrSession=null; // reset so QR gets re-painted
      S.qrSession=id;render();startCountdown();startQrRefreshTimer();
      watchAttendance(id);
      break;
    case 'close-qr':
      stopWatchAttendance(S.qrSession);
      S.qrSession=null;stopCountdown();stopQrRefreshTimer();render();break;
    case 'end-session':{
      const s=S.sessions[id];
      if(s){
        s.endedManually=true;
        try{await saveSession(id,s);flash('success','Session ended.');}
        catch{flash('error','Failed to end session.');}
        render();
      }break;
    }
    case 'delete-session':{
      if(confirm('Delete this session and all its attendance records? This cannot be undone.')){
        try{await deleteSessionData(id);flash('success','Session deleted.');}
        catch{flash('error','Delete failed.');}
        render();
      }break;
    }

    case 'refresh-qr':{
      const t=document.getElementById('qrcodeTarget');
      if(t){ t.dataset.forceRefresh='1'; _paintedQrSession=null; paintQrCode(); flash('success','QR code refreshed.'); }
      break;
    }
    case 'report-mode':S.reportMode=el.dataset.mode;render();break;
    case 'export-csv':exportCsv(id);break;

    case 'open-scan':openScanner();break;
    case 'close-scan':closeScanner();break;
    case 'scan-result-done':S.scanResult=null;render();break;

    default:break;
  }
}

/* ============================================================
   BOOT — Firebase Auth listener
   ============================================================ */
(async function boot(){
  if(CONFIG_IS_PLACEHOLDER){ render(); return; }

  // Render home immediately — don't wait for auth
  S.authLoading=false;
  render();

  // Safety timeout — if Firebase auth doesn't respond in 8s, show home anyway
  const authTimeout=setTimeout(()=>{
    S.authLoading=false;
    render();
    flash('warn','Firebase is taking long to respond. Check your config and internet connection.');
  },8000);

  // Watch auth state
  auth.onAuthStateChanged(async user=>{
    clearTimeout(authTimeout);
    S.authLoading=false;
    if(!user){
      if(S.view==='staffApp'||S.view==='studentApp'){
        S.view='home';S.isStaff=false;S.currentStudentData=null;
      }
      render();return;
    }

    // Signed in — show a brief loading state while we fetch data
    S.authUser=user;

    if(isStaffEmail(user.email)){
      // ── STAFF LOGIN ──
      S.isStaff=true;
      try{
        await loadAll();
      }catch(e){
        console.error('Failed to load data',e);
        flash('error','Signed in but could not load records. Check Firebase Realtime Database URL and security rules.');
      }
      S.view='staffApp';
      render();
    }else{
      // ── STUDENT LOGIN ──
      S.isStaff=false;
      try{
        await loadAll();
        // Try match by Firebase UID first (primary key used when student was added)
        const stu=S.students[user.uid];
        if(stu){
          S.currentStudentData=stu;
          S.view='studentApp';
        }else{
          // Fallback: match by stored firebaseEmail (handles legacy records)
          const match=Object.values(S.students).find(s=>s.firebaseEmail===user.email);
          if(match){
            S.currentStudentData=match;
            S.view='studentApp';
          }else{
            // Not found — this email is not a student AND not a staff email → sign out
            flash('error','This account is not linked to any student record. Please contact your lab staff.');
            await auth.signOut();
            S.view='home';
          }
        }
      }catch(e){
        console.error('load failed',e);
        flash('error','Could not load your student records. Check your internet connection and try again.');
        S.view='home';
      }
      render();
    }
  });
})();
</script>
